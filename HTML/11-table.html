<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="description" content="html table practice">
	<meta name="keyword" content="html, table">
	<link rel="icon" type="image/x-icon" href="favicon.ico">
	<title>employee table</title>
</head>
<body>
<table border="1">
	<caption>Employee Data</caption>
	<colgroup>
    	<col style="background-color:#ECC8AF">
    	<col style="background-color:#E7AD99">
    	<col>
    	<col>
    	<col style="background-color:#C18C5D">
	</colgroup>
	<thead>
		<tr>
			<th>Name</th>
			<th>FName</th>
			<th>City</th>
			<th>Age</th>
			<th>Salary</th>
		</tr>
	</thead>
	<tbody>
		<tr>
			<td>Smith</td>
			<td>John</td>
			<td>3</td>
			<td>40</td>
			<td>$280</td>
		</tr>
		<tr>
			<td>Doe</td>
			<td>Jane</td>
			<td>1</td>
			<td>28</td>
			<td>$325</td>
		</tr>
		<tr>
			<td>Brown</td>
			<td>Scott</td>
			<td>3</td>
			<td>41</td>
			<td>$359</td>
		</tr>
		<tr>
			<td>Howard</td>
			<td>Shemp</td>
			<td>3</td>
			<td>48</td>
			<td>$265</td>
		</tr>
		<tr>
			<td>Taylor</td>
			<td>Tom</td>
			<td>2</td>
			<td>22</td>
			<td>$250</td>
		</tr>	
	</tbody>
	<tfoot>
		<tr>
			<td colspan="5">Employee salary records</td>
		</tr>
	</tfoot>
</table>
</body>
</html>
